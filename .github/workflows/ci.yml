name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test --skip-tag soak
  tsan:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Thread sanitizer
        run: swift test --sanitize=thread --skip-tag soak
